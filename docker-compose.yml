services:
  backend:
    build: .
    container_name: backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./core:/app
    ports:
    - "8000:8000"
    depends_on:
      - smtp4dev

  smtp4dev:
    image: rnwood/smtp4dev:v3
    restart: on-failure
    ports:
      - "5000:80"
      - "2525:25"
      - "143:143"
      - "110:110"
    volumes:
      - smtp4dev-data:/smtp4dev
    environment:
      - ServerOptions__Urls=http://*:80
      - ServerOptions__HostName=smtp4dev

volumes:
  smtp4dev-data: